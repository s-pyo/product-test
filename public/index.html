<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-controls">
            <button class="theme-btn" id="light-mode-btn">☀️ Light Mode</button>
            <button class="theme-btn" id="dark-mode-btn">🌙 Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container">
            <!-- Numbers will be inserted here by JavaScript -->
        </div>
        <div id="quote-container" class="quote-container">
            <!-- Quote will be inserted here -->
        </div>
        <button id="generate-btn">Generate Numbers</button>
        <hr class="divider">
        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mvzvwpjj" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">이름/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
